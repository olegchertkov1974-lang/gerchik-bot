<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<p>Open this file in a browser, right-click each canvas and "Save image as..." to create icon-192.png and icon-512.png</p>
<h3>192x192</h3>
<canvas id="c192" width="192" height="192"></canvas>
<h3>512x512</h3>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');
  const r = s * 0.22;

  // Background
  const grad = ctx.createLinearGradient(0, 0, s, s);
  grad.addColorStop(0, '#7c7fbf');
  grad.addColorStop(1, '#5b5ea6');
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s);
  ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.fillStyle = grad;
  ctx.fill();

  // Chat bubble
  const cx = s / 2, cy = s * 0.47;
  const bw = s * 0.68, bh = s * 0.5;
  ctx.beginPath();
  ctx.ellipse(cx, cy, bw / 2, bh / 2, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.fill();

  // Tail
  ctx.beginPath();
  ctx.moveTo(s * 0.2, cy + bh * 0.35);
  ctx.lineTo(s * 0.12, s * 0.82);
  ctx.lineTo(s * 0.33, cy + bh * 0.25);
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.fill();

  // Dots
  const dotR = s * 0.04;
  const dotY = cy;
  ctx.fillStyle = '#5b5ea6';
  [cx - s * 0.12, cx, cx + s * 0.12].forEach(x => {
    ctx.beginPath();
    ctx.arc(x, dotY, dotR, 0, Math.PI * 2);
    ctx.fill();
  });
}
drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));
</script>
</body>
</html>
