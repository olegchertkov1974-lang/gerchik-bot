<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gerchik Dashboard</title>
<script src="/chart.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f2f5;color:#1a1a1a;font-size:13px;
     display:flex;flex-direction:column;height:100vh;overflow:hidden;padding:6px;gap:5px}
/* cards */
.cards{display:flex;gap:5px;flex-shrink:0}
.card{flex:1;background:#fff;border:1px solid #d0d7de;border-radius:6px;padding:5px 8px}
.card .lbl{font-size:10px;color:#777;text-transform:uppercase;letter-spacing:.04em}
.card .val{font-size:17px;font-weight:700;line-height:1.3}
/* charts */
.charts{display:flex;gap:5px;flex-shrink:0;height:180px}
.chart-wrap{flex:1;background:#fff;border:1px solid #d0d7de;border-radius:6px;padding:6px;min-width:0}
.chart-wrap h3{font-size:11px;color:#666;font-weight:600;margin-bottom:3px}
/* tables */
.tables{display:flex;gap:5px;flex:1;min-height:0}
.tbl{background:#fff;border:1px solid #d0d7de;border-radius:6px;padding:5px;overflow:hidden;display:flex;flex-direction:column}
.tbl.wide{flex:2}
.tbl.narrow{flex:1}
.tbl h3{font-size:11px;color:#666;font-weight:600;margin-bottom:3px;flex-shrink:0}
.tbl-inner{overflow:hidden;flex:1}
table{width:100%;border-collapse:collapse}
th{font-size:10px;color:#888;font-weight:600;border-bottom:1px solid #eee;padding:2px 4px;text-align:left;white-space:nowrap}
td{font-size:11px;padding:2px 4px;border-bottom:1px solid #f5f5f5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px}
tr:last-child td{border-bottom:none}
/* colors */
.g{color:#1a7f37}.r{color:#cf222e}.y{color:#9a6700}
.row-win{background:#f0fdf4}.row-loss{background:#fff5f5}
/* footer */
.footer{display:flex;align-items:center;gap:8px;flex-shrink:0;font-size:11px;color:#666}
.footer button{background:#0969da;color:#fff;border:none;border-radius:4px;padding:3px 10px;cursor:pointer;font-size:11px}
.footer button:hover{background:#0756b8}
#err{color:#cf222e;font-size:11px}
</style>
</head>
<body>

<div class="cards">
  <div class="card"><div class="lbl">Винрейт</div><div class="val" id="c0">—</div></div>
  <div class="card"><div class="lbl">Профит Фактор</div><div class="val" id="c1">—</div></div>
  <div class="card"><div class="lbl">Чистый PnL $</div><div class="val" id="c2">—</div></div>
  <div class="card"><div class="lbl">Матожидание</div><div class="val" id="c3">—</div></div>
  <div class="card"><div class="lbl">Шарп</div><div class="val" id="c4">—</div></div>
  <div class="card"><div class="lbl">Просадка $</div><div class="val r" id="c5">—</div></div>
</div>

<div class="charts">
  <div class="chart-wrap">
    <h3>Кривая доходности</h3>
    <canvas id="cvEq"></canvas>
  </div>
  <div class="chart-wrap">
    <h3>PnL по часам UTC</h3>
    <canvas id="cvHr"></canvas>
  </div>
</div>

<div class="tables">
  <div class="tbl narrow">
    <h3>Топ пар по PF</h3>
    <div class="tbl-inner"><table id="tPairs"></table></div>
  </div>
  <div class="tbl narrow">
    <h3>По типу уровня</h3>
    <div class="tbl-inner"><table id="tLevel"></table></div>
  </div>
  <div class="tbl wide">
    <h3>Последние 10 сделок</h3>
    <div class="tbl-inner"><table id="tTrades"></table></div>
  </div>
</div>

<div class="footer">
  <button onclick="load()">⟳ Обновить</button>
  <span id="upd">—</span>
  <span id="err"></span>
  <span style="margin-left:auto" id="tot"></span>
</div>

<script>
var eqC, hrC;
function f(n,d){d=d||2;return typeof n==='number'?n.toFixed(d):String(n==null?'—':n);}
function pc(v){return v>0?'g':v<0?'r':'';}
function setEl(id,txt,cls){var e=document.getElementById(id);e.textContent=txt;if(cls)e.className='val '+cls;}

function renderCards(s){
  var pf=s.profitFactor>=9999?'∞':f(s.profitFactor,2);
  setEl('c0',f(s.winRate,1)+'%',s.winRate>=50?'val g':'val r');
  setEl('c1',pf,s.profitFactor>=1?'val g':'val r');
  setEl('c2',f(s.netPnl,2),pc(s.netPnl)?'val '+pc(s.netPnl):'val');
  setEl('c3',f(s.expectancy,4),pc(s.expectancy)?'val '+pc(s.expectancy):'val');
  setEl('c4',f(s.sharpe,2),s.sharpe>=1?'val g':s.sharpe>=0?'val y':'val r');
  document.getElementById('c5').textContent=f(s.maxDrawdown,2);
  document.getElementById('tot').textContent='Сделок: '+s.total+' | Win: '+s.wins+' | Loss: '+s.losses;
}

function renderEq(data){
  var cv=document.getElementById('cvEq');
  var h=cv.parentElement.clientHeight-28;
  cv.height=h;
  if(eqC){eqC.destroy();}
  var vals=data.map(function(d){return d.pnl;});
  var last=vals.length?vals[vals.length-1]:0;
  var col=last>=0?'#1a7f37':'#cf222e';
  eqC=new Chart(cv,{
    type:'line',
    data:{labels:vals.map(function(_,i){return i+1;}),
      datasets:[{data:vals,borderColor:col,borderWidth:1.5,pointRadius:0,
        fill:true,backgroundColor:col+'22',tension:0.3}]},
    options:{responsive:false,animation:false,plugins:{legend:{display:false}},
      scales:{x:{display:false},y:{grid:{color:'#eee'},ticks:{color:'#999',font:{size:9},maxTicksLimit:5}}}}
  });
}

function renderHr(data){
  var cv=document.getElementById('cvHr');
  var h=cv.parentElement.clientHeight-28;
  cv.height=h;
  if(hrC){hrC.destroy();}
  hrC=new Chart(cv,{
    type:'bar',
    data:{labels:data.map(function(d){return d.hour;}),
      datasets:[{data:data.map(function(d){return d.pnl;}),
        backgroundColor:data.map(function(d){return d.pnl>=0?'#1a7f3777':'#cf222e77';}),borderWidth:0}]},
    options:{responsive:false,animation:false,plugins:{legend:{display:false}},
      scales:{x:{grid:{display:false},ticks:{color:'#999',font:{size:8}}},
              y:{grid:{color:'#eee'},ticks:{color:'#999',font:{size:9},maxTicksLimit:5}}}}
  });
}

function renderPairs(rows){
  var html='<tr><th>Пара</th><th>N</th><th>PF</th><th>PnL</th></tr>';
  rows.slice(0,5).forEach(function(p){
    var pf=p.pf>=9999?'∞':f(p.pf,2);
    html+='<tr><td>'+p.pair+'</td><td>'+p.count+'</td><td class="'+( p.pf>=1?'g':'r')+'">'+pf+'</td><td class="'+pc(p.netPnl)+'">'+f(p.netPnl,2)+'</td></tr>';
  });
  document.getElementById('tPairs').innerHTML=html;
}

function renderLevel(rows){
  var html='<tr><th>Тип</th><th>N</th><th>Win%</th><th>RR</th><th>PnL</th></tr>';
  rows.forEach(function(l){
    html+='<tr><td>'+l.type+'</td><td>'+l.count+'</td><td class="'+(l.winRate>=50?'g':'r')+'">'+f(l.winRate,1)+'%</td><td class="'+pc(l.avgRR)+'">'+f(l.avgRR,2)+'R</td><td class="'+pc(l.netPnl)+'">'+f(l.netPnl,2)+'</td></tr>';
  });
  document.getElementById('tLevel').innerHTML=html;
}

function renderTrades(rows){
  var ctMap={'sl':'СЛ','tp':'ТП','breakeven':'б/у','manual':'ручное','trailing':'трейлинг'};
  var html='<tr><th>Пара</th><th>Сторона</th><th>PnL</th><th>RR</th><th>Причина</th><th>Время</th></tr>';
  rows.slice(0,10).forEach(function(t){
    var rr=t.rr!=null?f(parseFloat(t.rr),2)+'R':'—';
    var ts=(t.closedAt||'').slice(5,16);
    var cls=t.pnl>0?'row-win':t.pnl<0?'row-loss':'';
    var ct=t.closeType?ctMap[t.closeType]||t.closeType:'—';
    html+='<tr class="'+cls+'"><td>'+t.pair+'</td><td>'+t.side+'</td><td class="'+pc(t.pnl)+'">'+f(t.pnl,2)+'</td><td>'+rr+'</td><td>'+ct+'</td><td>'+ts+'</td></tr>';
  });
  document.getElementById('tTrades').innerHTML=html;
}

function load(){
  document.getElementById('upd').textContent='Загрузка...';
  document.getElementById('err').textContent='';
  fetch('/api/stats').then(function(r){return r.json();}).then(function(d){
    renderCards(d.summary);
    renderEq(d.equity);
    renderHr(d.byHour);
    renderPairs(d.topPairs);
    renderLevel(d.byLevel);
    renderTrades(d.last20);
    document.getElementById('upd').textContent='Обновлено: '+new Date().toLocaleTimeString('ru-RU');
  }).catch(function(e){
    document.getElementById('err').textContent='Ошибка: '+e.message;
    document.getElementById('upd').textContent='';
  });
}

window.onerror=function(msg,src,line){
  document.getElementById('err').textContent='JS Error: '+msg+' ('+line+')';
};

window.addEventListener('load',load);
setInterval(load,60000);
</script>
</body>
</html>
